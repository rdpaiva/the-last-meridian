# nginx reverse proxy for the space-duel game server (option B — pick this OR
# deploy/Caddyfile, not both; use this if the VM already runs nginx).
#
# The GitHub Pages client is HTTPS, so the socket MUST be wss:// — this
# terminates TLS and forwards (including the WebSocket upgrade) to the
# systemd unit on localhost:2567.
#
# Install:
#   1. Replace play.example.com with the real subdomain (DNS A record → this VM).
#   2. sudo cp deploy/nginx-play.conf /etc/nginx/sites-available/space-duel.conf
#      sudo ln -s /etc/nginx/sites-available/space-duel.conf /etc/nginx/sites-enabled/
#   3. Certs: `sudo certbot --nginx -d play.example.com` fills in the ssl_
#      lines below (or point them at existing certificates).
#   4. sudo nginx -t && sudo systemctl reload nginx

# WebSocket upgrade pass-through: close the upstream connection when the
# client didn't ask for an upgrade, upgrade when it did.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    server_name play.example.com;

    # Filled in by certbot (step 3 above):
    ssl_certificate     /etc/letsencrypt/live/play.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/play.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:2567;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Matches are long-lived sockets — don't let the proxy time them out
        # under an idle spell (the client pings, but leave headroom).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

server {
    listen 80;
    server_name play.example.com;
    return 301 https://$host$request_uri;
}
