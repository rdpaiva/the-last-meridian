name: Deploy game server

# MANUAL-ONLY by design (docs/DEPLOY.md): the Pages client deploys on every
# push to main, and PROTOCOL_VERSION refuses mismatched joins — so the server
# must be deployed from the SAME commit, deliberately, right after a client
# deploy. A push trigger here could also surprise-restart live matches.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_SSH_KEY  private key whose public half is in the VM user's
#                   authorized_keys
#   DEPLOY_HOST     ssh target, e.g. spaceduel-deploy@play.example.com
# The VM user needs passwordless `sudo systemctl restart space-duel` only
# (sudoers line in docs/DEPLOY.md).
on:
  workflow_dispatch:

concurrency:
  group: server-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build -w @space-duel/server
      - name: Ship bundle + restart unit
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${HOST#*@}" >> ~/.ssh/known_hosts 2>/dev/null
          # Upload beside the live bundle, then swap atomically before the
          # restart — a half-written file must never be what systemd boots.
          scp -i ~/.ssh/deploy_key server/dist/server.mjs "$HOST:/opt/space-duel/server.mjs.new"
          ssh -i ~/.ssh/deploy_key "$HOST" \
            'mv /opt/space-duel/server.mjs.new /opt/space-duel/server.mjs && sudo systemctl restart space-duel'
