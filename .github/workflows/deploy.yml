name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Serialize deploys: GitHub Pages refuses a new deployment while another is
# in progress (two pushes close together raced and the second errored). This
# queues runs instead — cancel-in-progress: false lets the in-flight publish
# finish before the next starts, so no run fails on the concurrency conflict.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci && npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          # The client workspace's build output (the npm-workspace
          # restructure moved it from ./dist — root `npm run build` runs
          # the @space-duel/client build). When the MP server is hosted,
          # add VITE_SERVER_URL (wss://…) as an env on the build step.
          path: client/dist
      - id: deployment
        uses: actions/deploy-pages@v4
